<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>الفاروق للطباعة والإعلان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --c:#F5EFE6;--cd:#EDE0CE;--bd:#3D2B1F;--bm:#6B4C3B;
  --gd:#C9A84C;--gw:#7A7068;--gl:#C8BFB5;--wh:#FDFAF6;
  --tx:#2A1F17;--tg:#229ED9;--red:#DC2626;--grn:#16a34a;
}
/* إجبار الأرقام إنجليزية في كل الموقع ما عدا السعر */
* { font-variant-numeric: lining-nums; }
input, .q-num, .w-num { font-feature-settings: "tnum"; }
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;background:var(--c);color:var(--tx);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
button{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;cursor:pointer;border:none;}
input,select,textarea{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--cd);}::-webkit-scrollbar-thumb{background:var(--bm);border-radius:3px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 22px;border-radius:50px;font-weight:700;font-size:.88rem;transition:all .3s;cursor:pointer;border:none;}
.btn-dark{background:var(--bd);color:var(--c);}
.btn-dark:hover{background:var(--bm);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--bd);border:2px solid var(--bd);}
.btn-outline:hover{background:var(--bd);color:var(--c);transform:translateY(-2px);}
.btn-gold{background:var(--gd);color:var(--bd);}
.btn-gold:hover{transform:scale(1.04);}
.btn-grn{background:var(--grn);color:#fff;}
.btn-grn:hover{background:#15803d;transform:translateY(-2px);}
.btn-sm{padding:7px 15px;font-size:.8rem;}
.btn-full{width:100%;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

.field{margin-bottom:14px;}
.field label{display:block;font-weight:700;color:var(--bd);margin-bottom:6px;font-size:.87rem;}
.req{color:var(--gd);}
.inp{width:100%;padding:10px 13px;border:1.5px solid var(--cd);border-radius:11px;background:var(--c);color:var(--tx);font-size:.9rem;outline:none;transition:all .3s;-webkit-appearance:none;appearance:none;}
.inp:focus{border-color:var(--bm);background:var(--wh);box-shadow:0 0 0 3px rgba(107,76,59,.1);}
textarea.inp{resize:vertical;min-height:80px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* NAV */
#nav{position:fixed;top:36px;width:100%;z-index:1000;background:rgba(245,239,230,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--cd);padding:10px 22px;display:flex;align-items:center;justify-content:space-between;transition:all .3s, transform .35s cubic-bezier(.4,0,.2,1);}
#nav.sc{padding:7px 22px;box-shadow:0 4px 20px rgba(61,43,31,.1);}
.nlogo{display:flex;align-items:center;gap:9px;cursor:pointer;}
.nlogo svg{width:34px;height:34px;flex-shrink:0;}
.nbrand{font-family:'Tajawal','Segoe UI',sans-serif;font-weight:900;font-size:1.12rem;color:var(--bd);line-height:1.1;}
.nsub{font-size:.59rem;color:var(--gw);}
.nlinks{display:flex;gap:16px;list-style:none;}
.nlinks a{color:var(--bm);font-weight:600;font-size:.83rem;position:relative;transition:color .3s;padding-bottom:2px;}
.nlinks a::after{content:'';position:absolute;bottom:0;right:0;width:0;height:2px;background:var(--gd);transition:width .3s;}
.nlinks a:hover{color:var(--bd);}
.nlinks a:hover::after{width:100%;}
.nright{display:flex;align-items:center;gap:8px;}
.auth-icon{width:36px;height:36px;border-radius:50%;background:var(--cd);border:none;display:flex;align-items:center;justify-content:center;font-size:1.05rem;cursor:pointer;transition:all .3s;}
.auth-icon:hover{background:var(--gl);}
.user-chip{display:none;align-items:center;gap:6px;background:var(--cd);padding:3px 11px 3px 4px;border-radius:50px;}
.user-chip img{width:26px;height:26px;border-radius:50%;border:2px solid var(--gd);}
.uname{font-size:.77rem;font-weight:700;color:var(--bd);max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-out{background:none;color:var(--gw);font-size:.72rem;padding:1px 4px;border-radius:4px;cursor:pointer;border:none;}
.cart-btn{position:relative;background:var(--bd);color:var(--c);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .3s;border:none;}
.cart-btn:hover{background:var(--bm);transform:scale(1.07);}
.cart-badge{position:absolute;top:-4px;left:-4px;background:var(--gd);color:var(--bd);width:17px;height:17px;border-radius:50%;font-size:.63rem;font-weight:900;display:none;align-items:center;justify-content:center;}
.ham{display:none;background:none;font-size:1.3rem;color:var(--bd);padding:4px;border:none;cursor:pointer;}
.mnav{display:none;position:fixed;top:95px;inset-x:0;z-index:998;background:var(--wh);border-bottom:1px solid var(--cd);padding:11px 15px;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(61,43,31,.1);}
.mnav.open{display:flex;}
.mnav a{padding:9px 12px;border-radius:9px;color:var(--bd);font-weight:600;font-size:.89rem;transition:background .2s;}
.mnav a:hover{background:var(--c);}

/* HERO */
#hero{min-height:100vh;padding-top:104px;display:flex;align-items:center;background:linear-gradient(140deg,var(--c) 0%,var(--cd) 55%,#DDD0BE 100%);position:relative;overflow:hidden;}
.hd1{position:absolute;bottom:-120px;left:-80px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(161,120,80,.1) 0%,transparent 70%);}
.hd2{position:absolute;top:-80px;right:-60px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(122,112,104,.08) 0%,transparent 70%);}
.hero-in{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:55px 22px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:55px;align-items:center;}
.hbadge{display:inline-flex;align-items:center;gap:7px;background:var(--bd);color:var(--c);padding:5px 15px;border-radius:50px;font-size:.74rem;font-weight:700;margin-bottom:18px;animation:fu .7s ease both;}
.hbadge::before{content:'●';color:var(--gd);font-size:.44rem;animation:bl 2s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
h1{font-family:'Tajawal','Segoe UI',sans-serif;font-size:3rem;font-weight:900;line-height:1.15;color:var(--bd);margin-bottom:15px;animation:fu .8s .1s ease both;}
h1 em{font-style:normal;color:var(--gd);}
.hp{font-size:.94rem;color:var(--gw);line-height:1.85;margin-bottom:28px;animation:fu .8s .2s ease both;}
.hbtns{display:flex;gap:11px;flex-wrap:wrap;animation:fu .8s .3s ease both;}
.hstats{display:flex;gap:24px;margin-top:30px;animation:fu .8s .4s ease both;}
.hsn{font-family:'Tajawal','Segoe UI',sans-serif;font-size:1.8rem;font-weight:900;color:var(--bd);display:block;}
.hsl{font-size:.71rem;color:var(--gw);}
.hsep{width:1px;background:var(--gl);}
.hero-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;animation:fr .9s .2s ease both;}
.hcard{background:var(--wh);border-radius:16px;padding:18px;border:1px solid var(--cd);}
.hcard-ico{font-size:1.9rem;display:block;margin-bottom:7px;}
.hcard-name{font-family:'Tajawal','Segoe UI',sans-serif;font-weight:800;font-size:.9rem;color:var(--bd);margin-bottom:3px;}
.hcard-sub{font-size:.75rem;color:var(--gw);}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fr{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

/* SECTIONS */
section:not(#hero){padding:75px 22px;}
.sh{text-align:center;margin-bottom:46px;}
.stag{display:inline-block;background:var(--c);color:var(--bm);padding:5px 15px;border-radius:50px;font-size:.75rem;font-weight:700;margin-bottom:12px;border:1px solid var(--cd);}
.st{font-family:'Tajawal','Segoe UI',sans-serif;font-size:2.1rem;font-weight:900;color:var(--bd);margin-bottom:8px;}
.ss{color:var(--gw);font-size:.9rem;}

/* SERVICES */
#services{background:var(--c);}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;max-width:1200px;margin:0 auto;}
.sc{background:var(--wh);border-radius:14px;padding:18px 14px;border:1px solid var(--cd);cursor:pointer;transition:all .3s;position:relative;overflow:hidden;text-align:center;}
.sc::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,var(--bd),var(--bm));opacity:0;transition:opacity .32s;}
.sc:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(61,43,31,.15);}
.sc:hover::before{opacity:1;}
.sc-in{position:relative;z-index:2;}
.sc-ico{font-size:2rem;display:block;margin-bottom:8px;transition:color .32s;}
.sc-name{font-family:'Tajawal','Segoe UI',sans-serif;font-size:.9rem;font-weight:800;color:var(--bd);transition:color .32s;}
.sc:hover .sc-ico,.sc:hover .sc-name{color:var(--c)!important;}
/* Show more button */
.show-more-wrap{text-align:center;margin-top:18px;}
.sc.hidden-prod{display:none;}
.sc.hidden-prod.shown{display:block;}

/* ORDER */
#order{background:linear-gradient(180deg,var(--cd) 0%,var(--c) 100%);}
.ow{max-width:760px;margin:0 auto;}
.oc{background:var(--wh);border-radius:24px;padding:34px;box-shadow:0 20px 60px rgba(61,43,31,.1);}

/* Steps */
.sbar{display:flex;align-items:center;gap:4px;margin-bottom:26px;}
.sdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;transition:all .3s;flex-shrink:0;}
.sdot.ac{background:var(--bd);color:var(--c);}
.sdot.dn{background:var(--gd);color:#fff;}
.sdot.id{background:var(--cd);color:var(--gw);}
.sline{flex:1;height:2px;background:var(--cd);transition:background .3s;}
.sline.dn{background:var(--gd);}
.pane{display:none;animation:fu .3s ease;}
.pane.on{display:block;}
.ptitle{font-family:'Tajawal','Segoe UI',sans-serif;font-size:1.22rem;font-weight:800;color:var(--bd);margin-bottom:3px;}
.psub{color:var(--gw);font-size:.81rem;margin-bottom:16px;}

/* Product grid in order */
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
.po{background:var(--c);border:2px solid var(--cd);border-radius:9px;padding:9px 4px;text-align:center;cursor:pointer;transition:all .3s;}
.po:hover{border-color:var(--bm);}
.po.on{border-color:var(--bd);background:var(--bd);}
.po.on .poi,.po.on .pon{color:var(--c)!important;}
.poi{font-size:1.4rem;display:block;margin-bottom:3px;}
.pon{font-size:.67rem;font-weight:700;color:var(--bd);line-height:1.2;}
.pg-more-btn{text-align:center;margin-top:6px;margin-bottom:14px;}

/* Print type */
.print-type{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.pt-card{background:var(--c);border:2px solid var(--cd);border-radius:13px;padding:14px;text-align:center;cursor:pointer;transition:all .3s;}
.pt-card:hover{border-color:var(--bm);}
.pt-card.on{border-color:var(--bd);background:var(--bd);}
.pt-card.on .pt-name,.pt-card.on .pt-sub{color:var(--c)!important;}

.pt-ico{font-size:1.8rem;display:block;margin-bottom:5px;}
.pt-name{font-family:'Tajawal','Segoe UI',sans-serif;font-weight:800;font-size:.9rem;color:var(--bd);}
.pt-sub{font-size:.72rem;color:var(--gw);margin-top:2px;}

/* Sides */
.sides-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.side-card{background:var(--c);border:2px solid var(--cd);border-radius:11px;padding:12px;text-align:center;cursor:pointer;transition:all .3s;}
.side-card:hover{border-color:var(--bm);}
.side-card.on{border-color:var(--bd);background:var(--bd);color:var(--c);}
.side-card.on .side-name{color:var(--c);}
.side-name{font-weight:700;font-size:.87rem;color:var(--bd);}
.side-sub{font-size:.73rem;color:var(--gw);margin-top:2px;}

/* Chips */
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.chip{background:var(--c);border:2px solid var(--cd);border-radius:50px;padding:5px 13px;font-size:.8rem;font-weight:700;color:var(--bd);cursor:pointer;transition:all .3s;white-space:nowrap;}
.chip:hover{border-color:var(--bm);}
.chip.on{background:var(--bd);color:var(--c);border-color:var(--bd);}
.chip.rec{border-color:var(--gd);}

/* Weight input */
.weight-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.weight-box{display:flex;align-items:center;border:2px solid var(--cd);border-radius:10px;overflow:hidden;background:var(--c);}
.w-btn{width:36px;height:36px;background:none;border:none;font-size:1.2rem;font-weight:700;color:var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.w-btn:hover{background:var(--cd);}
.w-num{width:60px;border:none;background:none;text-align:center;font-weight:700;font-size:.9rem;color:var(--bd);outline:none;}
.w-unit{font-size:.78rem;color:var(--gw);}

/* Custom size */
.custom-size-wrap{display:none;margin-top:9px;}
.custom-size-wrap.show{display:block;}

/* Box dimensions */
.box-dims{display:none;margin-top:9px;}
.box-dims.show{display:block;}

/* Qty */
.qty-box{display:flex;align-items:center;border:2px solid var(--cd);border-radius:11px;overflow:hidden;background:var(--c);width:fit-content;}
.q-btn{width:38px;height:38px;background:none;border:none;font-size:1.2rem;font-weight:700;color:var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.q-btn:hover{background:var(--cd);}
.q-num{width:75px;border:none;background:none;text-align:center;font-weight:700;font-size:.95rem;color:var(--bd);outline:none;}
.qty-err{font-size:.76rem;color:var(--red);margin-top:4px;display:none;}

/* Post-printing operations */
.ops-section{margin-top:18px;}
.ops-title{font-weight:700;color:var(--bd);font-size:.88rem;margin-bottom:10px;}
.ops-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.op-card{background:var(--c);border:2px solid var(--cd);border-radius:10px;padding:9px 11px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:7px;}
.op-card:hover{border-color:var(--bm);}
.op-card.on{border-color:var(--bd);background:var(--bd);}
.op-card.on .op-name,.op-card.on .op-price{color:var(--c)!important;}
.op-ico{font-size:1.2rem;flex-shrink:0;}
.op-text{}
.op-name{font-size:.79rem;font-weight:700;color:var(--bd);}
.op-price{font-size:.7rem;color:var(--gw);}
/* Custom op note */
.op-custom-inp{display:none;width:100%;margin-top:6px;}
.op-custom-inp.show{display:block;}

/* AI price box */
.ai-price{background:linear-gradient(135deg,var(--bd),var(--bm));color:var(--c);border-radius:13px;padding:15px 18px;margin-top:14px;}

.ai-price-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
.ai-lbl{font-size:.8rem;opacity:.8;}
.ai-note{font-size:.68rem;opacity:.65;margin-top:2px;}
.ai-val{font-family:'Tajawal','Segoe UI',sans-serif;font-size:1.6rem;font-weight:900;text-align:left;}
.ai-details{background:rgba(255,255,255,.1);border-radius:9px;padding:11px;font-size:.77rem;line-height:1.9;}
.ai-details div{border-bottom:1px solid rgba(255,255,255,.08);padding:2px 0;}
.ai-details div:last-child{border-bottom:none;}

/* Upload */
.uz{border:2.5px dashed var(--cd);border-radius:14px;padding:28px 14px;text-align:center;cursor:pointer;transition:all .3s;background:var(--c);position:relative;overflow:hidden;}
.uz:hover{border-color:var(--bm);background:var(--cd);}
.uz.has{border-color:var(--gd);background:rgba(201,168,76,.05);}
.uz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uz-ico{font-size:2rem;display:block;margin-bottom:8px;}
.uz-txt{font-weight:700;color:var(--bd);font-size:.9rem;margin-bottom:3px;}
.uz-sub{font-size:.73rem;color:var(--gw);}
.fbadge{display:none;margin-top:9px;background:var(--gd);color:#fff;border-radius:7px;padding:5px 11px;font-size:.77rem;font-weight:700;}
.pw{display:none;margin-top:9px;}
.pb2{background:var(--cd);border-radius:9px;height:6px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--gd),var(--bm));border-radius:9px;width:0%;transition:width .3s;}
.ptxt{font-size:.73rem;color:var(--gw);margin-top:4px;text-align:center;}
.dh{background:var(--c);border-radius:10px;padding:11px 14px;margin-top:11px;border-right:4px solid var(--gd);}
.dht{font-weight:700;color:var(--bd);font-size:.83rem;margin-bottom:4px;}
.dhn{font-size:.79rem;color:var(--gw);line-height:1.9;}
.dhn strong{color:var(--bd);}

/* Summary */
.smb{background:var(--c);border-radius:11px;padding:16px;margin-bottom:14px;}
.sr{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--cd);}
.sr:last-child{border-bottom:none;}
.slb{font-size:.8rem;color:var(--gw);flex-shrink:0;margin-left:8px;}
.svl{font-weight:700;color:var(--bd);font-size:.85rem;text-align:left;max-width:62%;}
.pnote{background:var(--cd);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:.8rem;color:var(--gw);line-height:1.8;}
.pnote strong{color:var(--bd);}

/* Deposit */
.dep-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:7px;}
.dep-card{background:var(--c);border:2px solid var(--cd);border-radius:13px;padding:13px;text-align:center;cursor:pointer;transition:all .3s;}
.dep-card:hover{border-color:var(--bm);}
.dep-card.on{border-color:var(--bd);background:var(--bd);}
.dep-card.on .dep-pct,.dep-card.on .dep-lbl,.dep-card.on .dep-amt{color:var(--c)!important;}
.dep-pct{font-family:'Tajawal','Segoe UI',sans-serif;font-size:1.45rem;font-weight:900;color:var(--gd);display:block;margin-bottom:2px;}
.dep-lbl{font-size:.77rem;font-weight:700;color:var(--bd);}
.dep-amt{font-size:.75rem;color:var(--gw);margin-top:3px;display:block;}

.stb{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.bbk{background:var(--cd);color:var(--bd);padding:11px 17px;border-radius:50px;font-weight:700;font-size:.86rem;flex-shrink:0;cursor:pointer;border:none;}
.bbk:hover{background:var(--gl);}

/* Invoice modal */
.inv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:3000;display:flex;align-items:center;justify-content:center;padding:14px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.inv-overlay.open{opacity:1;pointer-events:all;}
.inv-box{background:var(--wh);border-radius:18px;width:100%;max-width:700px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(.94);transition:transform .3s;box-shadow:0 28px 75px rgba(0,0,0,.3);}
.inv-overlay.open .inv-box{transform:scale(1);}
.inv-mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--cd);flex-shrink:0;}
.inv-mhead h3{font-family:'Tajawal','Segoe UI',sans-serif;font-weight:900;font-size:1.1rem;color:var(--bd);}
.inv-mclose{background:var(--cd);color:var(--bd);width:29px;height:29px;border-radius:50%;font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.inv-mclose:hover{background:var(--gl);}
.inv-scroll{overflow-y:auto;flex:1;}
#invoice{direction:rtl;font-family:'Cairo','Segoe UI',sans-serif;background:var(--wh);}
.inv-h{background:var(--c);padding:22px 30px;border-bottom:2px solid var(--cd);display:flex;justify-content:space-between;align-items:flex-start;}
